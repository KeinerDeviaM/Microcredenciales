server:
  port: ${PORT:8080}

spring:
  application:
    name: microcredenciales-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/microcredenciales;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  jwt:
    secret: ${JWT_SECRET:ZWR0ZWNoLW1pY3JvY3JlZGVuY2lhbGVzLXNlY3JldC1jb3Jwb3JhdGl2by1tdXktbGFyZ28tNjQtYnl0ZXMtcHJvZA==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
